<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디딤 프로젝트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111;
  color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  max-width:480px;
  margin:0 auto;
}
.header {
  background:#28246B;
  padding:30px 20px 22px;
  text-align:center;
}
.header img.main-logo {
  width:240px;
  max-width:80%;
  margin-bottom:14px;
  display:block;
  margin-left:auto;
  margin-right:auto;
}
.intro-section {
  background:#fff;
  color:#222;
  padding:44px 26px 36px;
  text-align:center;
}
.sec-title-black {
  font-family:'Noto Serif KR',serif;
  font-size:22px;
  font-weight:700;
  color:#111;
  margin-bottom:24px;
}
.intro-text {
  font-size:13px;
  color:#555;
  line-height:2;
  text-align:left;
  word-break:keep-all;
}
.intro-cta {
  margin-top:28px;
  font-size:16px;
  font-weight:700;
  color:#111;
  line-height:2.1;
  font-family:'Noto Serif KR',serif;
  text-align:center;
}
.sponsor-wrap {
  background:#1a2040;
  padding:38px 18px 30px;
}
.sec-title-white {
  font-size:16px;
  font-weight:700;
  color:#fff;
  text-align:center;
  margin-bottom:20px;
}
.benefit-table {
  width:100%;
  border-collapse:collapse;
  font-size:12.5px;
}
.benefit-table th, .benefit-table td {
  border:2px solid #2a3868;
  text-align:center;
}
.benefit-table th {
  background:#5a85e0;
  color:#fff;
  padding:12px 8px;
}
.cell-common, .cell-mid, .cell-top {
  background:#8ab4f0;
  color:#fff;
  padding:14px 10px;
  line-height:1.8;
}
.cell-label {
  background:#6a9de0;
  color:#fff;
  font-size:18px;
  font-weight:700;
}
.cell-dark { background:#1a2a5a; }
.tier-note {
  margin-top:14px;
  font-size:11px;
  color:#7a90c0;
  line-height:1.9;
}
.baek-wrap {
  background:#0c0c18;
  padding:44px 24px 40px;
  text-align:center;
}
.baek-logo-img {
  width:160px;
  max-width:70%;
  margin-bottom:28px;
}
.baek-body {
  font-size:14px;
  color:#aaa;
  line-height:2.3;
}
.photo-wrap {
  background:#fff;
  color:#111;
  padding:38px 20px;
}
.photo-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}
.photo-cell {
  aspect-ratio:1;
  background:#ccc;
  border-radius:3px;
  overflow:hidden;
}
.photo-cell img {
  width:100%;
  height:100%;
  object-fit:cover;
}
.sns-wrap {
  background:#111;
  padding:16px 20px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}
.sns-link {
  color:#ccc;
  text-decoration:none;
}
.donor-wrap {
  background:#fff;
  color:#111;
  padding:50px 24px 56px;
  text-align:center;
}
</style>
</head>
<body>
<div class="header">
  <img class="main-logo" src="https://raw.githubusercontent.com/ekdud0423/Ddimsupport/main/%EB%94%94%EB%94%A4%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8%EB%A1%9C%EA%B3%A0.png">
</div>
<div class="intro-section">
  <div class="sec-title-black">디딤 프로젝트 소개</div>
  <div class="intro-text">(기존 소개문 동일)</div>
</div>
<div class="sponsor-wrap">
  <div class="sec-title-white">디딤프로젝트 후원 혜택 안내</div>
</div>
<div class="baek-wrap">
  <img class="baek-logo-img" src="https://raw.githubusercontent.com/ekdud0423/Ddimsupport/main/%EB%B0%B1%EC%9D%BC%EB%AA%BD%EB%A1%9C%EA%B3%A0_%EA%B8%80%EC%94%A8%EC%A7%84%EC%A7%9C%EC%B5%9C%EC%A2%85.png">
  <div class="baek-body">
    2024년에 창단한 극단 백일몽은,<br>
    <b>낮에 꿈을 꾸는 사람들의 집단</b>입니다.<br><br>
    우리는 현실을 외면하지 않습니다.<br>
    더 또렷한 시선으로 현실을 바라보기 위해,<br>
    꿈을 꿉니다.
  </div>
</div>
<div class="photo-wrap">
  <div class="photo-grid">
    <div class="photo-cell"><img src="여기에_raw_이미지링크1"></div>
    <div class="photo-cell"><img src="여기에_raw_이미지링크2"></div>
    <div class="photo-cell"><img src="여기에_raw_이미지링크3"></div>
  </div>
</div>
<div class="sns-wrap">
  <a href="https://www.instagram.com/day_101_dream" class="sns-link" target="_blank">Instagram</a>
  <a href="https://www.youtube.com/@backilmong_0202" class="sns-link" target="_blank">YouTube</a>
</div>
<div class="donor-wrap">
  <h2>후원자 명단</h2>
  <p>여러분의 후원이 이 무대를 완성합니다.</p>
</div>
</body>
</html>
